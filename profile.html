<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arpit Patel – Mentech3D</title>
<meta name="description" content="Connect with Arpit Patel, Founder of Mentech3D. Premium 3D Printed NFC Business Cards made in India.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0A0A;
    --surface:   rgba(255,255,255,0.05);
    --border:    rgba(255,255,255,0.08);
    --orange:    #FF6B2B;
    --orange-dim: rgba(255,107,43,0.15);
    --white:     #FFFFFF;
    --muted:     rgba(255,255,255,0.45);
    --card-bg:   rgba(255,255,255,0.04);
    --radius:    16px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 48px;
  }

  /* ── Top bar ── */
  .topbar {
    width: 100%;
    padding: 14px 20px;
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .topbar-logo span { color: var(--orange); }

  /* ── Card wrapper ── */
  .card {
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    margin-top: 32px;
  }

  /* ── Hero: avatar + name ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 18px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
  }

  /* Rotating NFC ring */
  .avatar-wrap::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--orange);
    border-right-color: var(--orange);
    animation: spin 3s linear infinite;
  }
  .avatar-wrap::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--orange-dim);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    background: #1E1E1E;
    /* placeholder gradient */
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
  }

  /* Avatar placeholder initials */
  .avatar-placeholder {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1E1E1E, #2A2A2A);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: -1px;
  }

  .hero-name {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .hero-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: -6px;
  }
  .hero-role {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }
  .hero-company {
    font-size: 13px;
    color: var(--orange);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* Company logo chip */
  .company-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--orange-dim);
    border: 1px solid rgba(255,107,43,0.25);
    border-radius: 100px;
    padding: 6px 14px 6px 8px;
    margin-top: 2px;
  }
  .company-chip-logo {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .company-chip-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--orange);
  }

  /* ── Action buttons ── */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 16px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: none;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }

  .btn-primary {
    background: var(--orange);
    color: #fff;
    grid-column: span 2;
    padding: 15px;
    font-size: 15px;
    border-radius: 14px;
  }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--white);
    border: 1px solid var(--border);
  }

  .btn-whatsapp {
    background: rgba(37,211,102,0.12);
    color: #25D366;
    border: 1px solid rgba(37,211,102,0.2);
  }

  /* ── Section label ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 28px 0 12px;
  }

  /* ── Link list ── */
  .link-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--white);
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .link-item:hover, .link-item:active {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.14);
    transform: translateX(2px);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 17px;
  }

  .link-icon.call    { background: rgba(52,199,89,0.15);   }
  .link-icon.email   { background: rgba(255,159,10,0.12);  }
  .link-icon.web     { background: rgba(10,132,255,0.12);  }
  .link-icon.insta   { background: rgba(193,53,132,0.15);  }
  .link-icon.linkedin{ background: rgba(10,102,194,0.15);  }

  .link-label {
    flex: 1;
  }
  .link-sublabel {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 1px;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 13px;
    flex-shrink: 0;
  }

  /* ── Save contact strip ── */
  .save-strip {
    margin-top: 24px;
    padding: 16px;
    background: var(--orange-dim);
    border: 1px solid rgba(255,107,43,0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .save-strip:hover { background: rgba(255,107,43,0.22); }

  .save-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .save-text strong {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--orange);
  }
  .save-text span {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }
  .save-strip .link-arrow { margin-left: auto; color: var(--orange); }

  /* ── QR section ── */
  .qr-section {
    margin-top: 24px;
    padding: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }
  .qr-box {
    width: 120px;
    height: 120px;
    background: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #aaa;
    padding: 8px;
  }
  .qr-box svg {
    width: 100%;
    height: 100%;
  }
  .qr-label {
    font-size: 13px;
    color: var(--muted);
  }
  .qr-label strong {
    display: block;
    font-size: 14px;
    color: var(--white);
    font-weight: 600;
    margin-bottom: 3px;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 36px;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.04em;
  }
  .footer a {
    color: var(--orange);
    text-decoration: none;
    opacity: 0.7;
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    .avatar-wrap::before { animation: none; }
  }
</style>
</head>
